{% set version = "0.16.0" %}

package:
  name: qtkeychain
  version: {{ version }}

source:
  url: https://github.com/frankosterfeld/qtkeychain/archive/{{ version }}.tar.gz
  sha256: 3be26ec4ae30eecf0c2ff7572ba83799791b157c76e15a05ef35f23dc25e4054
  # Various issues with cmake finding qtpaths with Qt6. Seems to try
  # cmake instead. Patch below hardcodes name
  patches:
    - qtpaths.patch

build:
  skip: true  # [(win and vc<14) or ppc64le]
  number: 0
  run_exports:
    - {{ pin_subpackage('qtkeychain', max_pin='x.x') }}

requirements:
  build:
    - pkg-config  # [unix]
    - cmake
    - make  # [unix]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
  host:
    - qt-main
    - libsecret  # [linux]
    - glib       # [linux]
    - zlib       # [linux]
  run:
    - qt-main
    - libsecret  # [linux]
    - zlib       # [linux]
test:
  commands:
    - test -f ${PREFIX}/lib/libqt5keychain${SHLIB_EXT}  # [not win]
    - if not exist %LIBRARY_BIN%\\qt5keychain.dll exit 1  # [win]
    - if not exist %LIBRARY_LIB%\\qt5keychain.lib exit 1  # [win]

outputs:
  - name: qtkeychain
  - name: qtkeychain-qt6
    script: build_qt6.sh  # [unix]
    script: bld_qt6.bat  # [win]
    run_exports:
      - {{ pin_subpackage('qtkeychain-qt6', max_pin='x.x') }}
    requirements:
      build:
        - pkg-config  # [unix]
        - cmake
        - make  # [unix]
        - {{ compiler('c') }}
        - {{ stdlib("c") }}
        - {{ compiler('cxx') }}
        - qt6-main    # [build_platform != target_platform]
      host:
        - qt6-main
        - libsecret  # [linux]
        - glib       # [linux]
        - zlib       # [linux]
      run:
        - qt6-main
        - libsecret  # [linux]
        - zlib       # [linux]
    test:
      commands:
        - test -f ${PREFIX}/lib/libqt6keychain${SHLIB_EXT}  # [not win]
        - if not exist %LIBRARY_BIN%\\qt6keychain.dll exit 1  # [win]
        - if not exist %LIBRARY_LIB%\\qt6keychain.lib exit 1  # [win]

about:
  home: https://github.com/frankosterfeld/qtkeychain
  license: BSD-3-Clause
  license_file: COPYING
  summary: QtKeychain is a Qt API to store passwords and other secret data securely

extra:
  recipe-maintainers:
    - ceholden
    - gillins
