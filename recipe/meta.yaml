{% set version = "0.15.0" %}

package:
  name: qtkeychain
  version: {{ version }}

source:
  url: https://github.com/frankosterfeld/qtkeychain/archive/{{ version }}.tar.gz
  sha256: f4254dc8f0933b06d90672d683eab08ef770acd8336e44dfa030ce041dc2ca22

build:
  skip: true  # [win and vc<14]
  number: 1
  run_exports:
    - {{ pin_subpackage('qtkeychain', max_pin='x.x') }}

requirements:
  build:
    - pkg-config  # [unix]
    - cmake
    - make  # [unix]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
  host:
    - qt-main
    - libsecret  # [linux]
    - glib       # [linux]
    - zlib       # [linux]
  run:
    - qt-main
    - libsecret  # [linux]
    - zlib       # [linux]

test:
  commands:
    - test -f ${PREFIX}/lib/libqt5keychain${SHLIB_EXT}  # [not win]
    - if not exist %LIBRARY_BIN%\\qt5keychain.dll exit 1  # [win]
    - if not exist %LIBRARY_LIB%\\qt5keychain.lib exit 1  # [win]
    
outputs:
  - name: qtkeychain
  
  - name: qtkeychain-qt6
    script: build_qt6.sh  # [unix]
    script: bld_qt6.bat  # [win]
    skip: true  # [ppc64le]
    requirements:
      build:
        - pkg-config  # [unix]
        - cmake
        - make  # [unix]
        - {{ compiler('c') }}
        - {{ stdlib("c") }}
        - {{ compiler('cxx') }}
      host:
        - qt6-main
        - libsecret  # [linux]
        - glib       # [linux]
        - zlib       # [linux]
      run:
        - qt6-main
        - libsecret  # [linux]
        - zlib       # [linux]

    test:
      commands:
        - test -f ${PREFIX}/lib/libqt6keychain${SHLIB_EXT}  # [not win]
        - if not exist %LIBRARY_BIN%\\qt6keychain.dll exit 1  # [win]
        - if not exist %LIBRARY_LIB%\\qt6keychain.lib exit 1  # [win]

about:
  home: https://github.com/frankosterfeld/qtkeychain
  license: BSD-3-Clause
  license_file: COPYING
  summary: QtKeychain is a Qt API to store passwords and other secret data securely

extra:
  recipe-maintainers:
    - ceholden
    - gillins
